{% extends "base.html" %} {% block content %}
{% include "toast.html" %}
<body class="bg-gradient-to-br from-slate-50 to-blue-50 font-sans antialiased min-h-screen">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl modal-fade-in">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-2xl font-bold text-slate-800">Изменить пароль</h3>
            <button id="closePasswordModalBtn" class="text-slate-400 hover:text-slate-600">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        <form id="changePasswordForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Текущий пароль</label>
                    <input type="password" id="currentPassword"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Новый пароль</label>
                    <input type="password" id="newPassword"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Подтверждение пароля</label>
                    <input type="password" id="confirmPassword"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 transition">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button type="submit"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-semibold transition">
                    Сменить пароль
                </button>
                <button type="button" id="cancelPasswordBtn"
                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-medium transition">
                    Отмена
                </button>
            </div>
        </form>
    </div>
</body>
{% endblock %}
