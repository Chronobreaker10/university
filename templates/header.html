<header class="bg-white/95 backdrop-blur-sm shadow-md sticky top-0 z-50 border-b border-slate-200">
    <nav class="max-w-[80%] mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16 md:h-20">
            <!-- Логотип и название -->
            <div class="flex items-center gap-2">
                <div class="bg-indigo-100 p-2 rounded-xl">
                    <i class="fas fa-user-graduate text-indigo-600 text-xl"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-xl font-bold text-slate-800">Университет</h1>
                    <p class="text-xs text-slate-500">Электронный журнал</p>
                </div>
                <div class="block sm:hidden">
                    <h1 class="text-lg font-bold text-slate-800">Учебный Центр</h1>
                </div>
            </div>

            <!-- Десктопное меню (навигация) -->
            <div class="hidden md:flex items-center gap-1">
                <!-- Список студентов -->
                <a href="{{ url_for('students.index') }}" id="navStudents"
                   class="nav-link px-4 py-2 rounded-xl text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition flex items-center gap-2 font-medium">
                    <i class="fas fa-users text-sm"></i>
                    <span>Студенты</span>
                </a>

                <!-- Специальности -->
                <a href="{{ url_for('majors.index') }}" id="navSpecialties"
                   class="nav-link px-4 py-2 rounded-xl text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition flex items-center gap-2 font-medium">
                    <i class="fas fa-graduation-cap text-sm"></i>
                    <span>Специальности</span>
                </a>

                <!-- Профиль -->
                <a href="{{ url_for('auth.profile') }}" id="navProfile"
                   class="nav-link px-4 py-2 rounded-xl text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition flex items-center gap-2 font-medium">
                    <i class="fas fa-user-circle text-sm"></i>
                    <span>Профиль</span>
                </a>
            </div>

            <!-- Правая часть: информация о пользователе + кнопка логаута -->
            <div class="flex items-center gap-3">
                <!-- Информация о пользователе (десктоп) -->
                <div class="hidden md:flex items-center gap-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                    <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-indigo-600 text-sm"></i>
                    </div>
                    <div class="text-sm">
                        <p class="font-semibold text-slate-700" id="userNameDisplay">{{ current_user.first_name }}</p>
                        <p class="text-xs text-slate-400" id="userRoleDisplay">{{ current_user.role.value }}</p>
                    </div>
                </div>

                <!-- Кнопка выхода (десктоп) -->
                <form id="logoutForm" action="{{ url_for('auth.logout') }}" method="post" class="hidden md:block">
                    <button id="logoutBtnDesktop" type="submit"
                            class="hidden md:flex items-center gap-2 px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl transition font-medium text-sm border border-red-200">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Выйти</span>
                    </button>
                </form>

                <!-- Мобильное меню (бургер) -->
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg hover:bg-slate-100 transition">
                    <i class="fas fa-bars text-slate-600 text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Мобильное выпадающее меню -->
    <div id="mobileMenu" class="md:hidden hidden bg-white border-t border-slate-200 shadow-lg mobile-menu-scroll">
        <div class="px-4 py-4 space-y-3">
            <!-- Информация о пользователе (мобильная) -->
            <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-2">
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-indigo-600"></i>
                </div>
                <div>
                    <p class="font-semibold text-slate-700" id="mobileUserName">{{ current_user.first_name }}</p>
                    <p class="text-xs text-slate-400" id="mobileUserRole">{{ current_user.role.value }}</p>
                </div>
            </div>

            <!-- Ссылки навигации мобильные -->
            <a href="{{ url_for('students.index') }}" id="mobileNavStudents"
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition font-medium">
                <i class="fas fa-users w-5"></i>
                <span>Список студентов</span>
            </a>
            <a href="{{ url_for('majors.index') }}" id="mobileNavSpecialties"
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition font-medium">
                <i class="fas fa-graduation-cap w-5"></i>
                <span>Специальности</span>
            </a>
            <a href="{{ url_for('auth.profile') }}" id="mobileNavProfile"
               class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition font-medium">
                <i class="fas fa-user-circle w-5"></i>
                <span>Мой профиль</span>
            </a>

            <div class="border-t border-slate-200 my-2"></div>

            <!-- Кнопка выхода мобильная -->
            <form id="logoutFormMobile" action="{{ url_for('auth.logout') }}" method="post" class="hidden md:block">
                <a id="logoutBtnMobile" href="{{ url_for('auth.logout') }}"
                   class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl transition font-medium">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выйти из системы</span>
                </a>
            </form>
        </div>
    </div>
</header>
